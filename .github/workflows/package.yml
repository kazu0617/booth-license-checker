name: Package Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r .version manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          zip -r booth-license-checker-v${{ steps.version.outputs.version }}.zip \
            manifest.json \
            background.js \
            content.js \
            options.html \
            options.js \
            popup.html \
            popup.js \
            vn3-options.js \
            warning.css \
            icons/ \
            lib/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: booth-license-checker-v${{ steps.version.outputs.version }}
          path: booth-license-checker-v${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: booth-license-checker-v${{ steps.version.outputs.version }}.zip
