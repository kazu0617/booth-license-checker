<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BOOTH License Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans',
        'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      width: 280px;
    }

    /* ── ヘッダー ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid #eee;
    }

    .header__logo {
      width: 32px; height: 32px;
      background: #1a73e8;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; font-weight: bold;
      flex-shrink: 0;
    }

    .header__title { font-size: 15px; font-weight: 700; flex: 1; }

    .toggle {
      position: relative;
      width: 38px; height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle__slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 20px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle__slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle__slider { background: #1a73e8; }
    .toggle input:checked + .toggle__slider::before { transform: translateX(18px); }

    /* ── ステータス ── */
    .status {
      padding: 14px;
      border-bottom: 1px solid #f0f0f0;
    }

    .status__label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .status__value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .status__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status__dot--ok      { background: #52c41a; }
    .status__dot--error   { background: #ff4d4f; }
    .status__dot--warn    { background: #faad14; }
    .status__dot--neutral { background: #d0d0d0; }

    /* ── フッター ── */
    .footer {
      padding: 12px 14px;
    }

    .btn-settings {
      display: block;
      width: 100%;
      padding: 8px;
      text-align: center;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-settings:hover { background: #ebebeb; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header__logo">V</div>
    <div class="header__title">BOOTH License Checker</div>
    <label class="toggle" title="有効/無効">
      <input type="checkbox" id="toggle-enabled">
      <span class="toggle__slider"></span>
    </label>
  </div>

  <div class="status">
    <div class="status__label">現在のページ</div>
    <div class="status__value" id="status-value">
      <span class="status__dot status__dot--neutral"></span>
      <span id="status-text">Booth.pm の商品ページを開いてください</span>
    </div>
  </div>

  <div class="footer">
    <a class="btn-settings" id="btn-settings" href="#">設定ページを開く</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
